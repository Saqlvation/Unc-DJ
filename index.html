<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>unc dj</title>
        <link rel="icon" type="image/png" href="assets/icon.png">
  <style>

            body {
                text-align: center;
            }
            #textComponents{
                text-align: center;
            }

            #visualizer{
                background: #050505;
                height: 200px;
                width: 600px;
            }

            .songItem{
                cursor: pointer;
                padding: 20px 20px;
                border-bottom: 8px;
            }
            #songs {
                padding: 10px;
                width: 300px;
                border: 2px #050505;
            }
            #mySongs{
                top: 20px;
                left: 10px;
                position: fixed;

            }
            #timeline {
                display: flex;
                justify-content:center;
                margin-top: 10px;
                gap: 10px;
                align-items: center;
            }
            #time{
                width: 300px;
                cursor: crosshair;
            }
            #controls {
                margin-bottom: 10px;
            }
            #play-pause{
                font-size: 20px;
                padding: 5px 15px;
                margin: 0 10px;
                cursor: pointer;
            }

        </style>

    </head>

    <body>
        <div id="textComponents">
        <h1>!! UNC DJ !!</h1>


        <!-- start of my own chosen songs selections -->
         <div id="mySongs">
            <h3>Instead of uploading you can edit one of these songs:</h3>
            <div id="songs">
                <div class="songItem" data-src="music/song1.mp3">Juna</div>
                <div class="songItem" data-src="music/song2.mp3">Babydoll</div>
            </div>
        </div>

        <div id="fileSelection">
        <p> You can drag your mp3 file here or click the button to select it</p>
        <input type="file" id="file-input" accept="audio/mp3">
        </div>
        <!-- the pause and play song button -->
        <div id="controls">
            <div id="buttons">
                <button id="play-pause">Play</button>
            </div>
        <!-- start of the line that tracks the time-->
         <div id="timeline">
            <span id="time">0;00</span>
            <input type="range" id="progress" min="0" max="100" value="0">
            <span id="totalDuration">0:00</span>
         </div>
        
        </div>




        <canvas id="visualizer"> </canvas>

        <br><br>

        <div id="controlZone">
            <div>
                <label for="bass-slider"> bass boost</label>
                <input type="range" id="bass-slider" min="0" max="25" value="0">
            </div>
            <div>
                <label for="nostalgia-slider"> old filter</label>
                <input type="range" id="nostalgia-slider" min="0" max="1" step= "1" value="0">
            </div>

    </div>






        <script src="script.js"></script>
    </body>
</html>
