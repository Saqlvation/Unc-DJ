<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>unc dj</title>
        <link rel="icon" type="image/png" href="assets/icon.png">
  <style>

            body {
                text-align: center;
                font-family: Georgia, 'Times New Roman', Times, serif;
                padding: 40px 35px;
                display: flex;
                align-items: center;
                margin: 0;
                color: #c5c6cc;
                background-color: #08122b;
                flex-direction: column;
            }
            #textComponents{
                text-align: center;
                margin-bottom: 20px;
            }
/* only edits h1 of textcomp */
            #textComponents h1{
                letter-spacing: 10px;
                color: #486fee;
                /* addin a sort of glow to the title */
                text-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
                font-size: 3rem;
            }

            #visualizer{
                background: #000000;
                height: 250px;
                width: 600px;
                /* gives that round effect on the edges */
                border-radius: 25px;
                border: 1px solid #000000;
            }

            .songItem{
                cursor: pointer;
                padding: 12px 16px;
                border-radius: 7px;
                color: #ffffff;
                /* bold */
                font-weight: 600;
                background: #163581;
            }
            .songItem:hover {
                /* highlights it of azure when u hover it and translatex the x axis of 5px */
                background: #38bdf8;
                transform: translateX(5px);
            }
            #songs {
                padding: 10px;
                width: 300px;
                border: 2px #050505;
            }
            #mySongs{
                top: 20px;
                left: 20px;
                position: fixed;

            }
            #timeline {
                display: flex;
                justify-content:center;
                margin-top: 15px;
                gap: 14px;
                align-items: center;
                font-family: 'Courier New', Courier, monospace;
                font-size: 0.8rem;
            }
            #time{
                min-width: 40px;
            }
            #controls {
                margin-bottom: 25px;
                padding: 30px;
                margin-bottom: 30px;
            }
            #play-pause{
                font-size: 1rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 1px;
                padding: 10px 30px;
                background: #38bdf8;
                color: #0f172a;
                border: none;
                border-radius: 30px;
                cursor: pointer;
            }
            #play-pause:hover {
                transform: scale(1.05);
                background: #7dd3fc;
            }

            #controlZone div {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }

            #fileSelection {
                /* dashed gives us that cool dotted effect */
                border: 2px dashed #475569;
                border-radius: 16px;
                padding: 24px;
                width: 550px;
                margin-bottom: 25px;
                
            }
        </style>

    </head>

    <body>
        <div id="textComponents">
        <h1>!! UNC DJ !!</h1>


        <!-- start of my own chosen songs selections -->
         <div id="mySongs">
            <h3>Instead of uploading you can edit one of these songs:</h3>
            <div id="songs">
                <div class="songItem" data-src="music/song1.mp3">Juna</div>
                <div class="songItem" data-src="music/song2.mp3">Babydoll</div>
            </div>
        </div>

        <div id="fileSelection">
        <p> You can drag your mp3 file here or click the button to select it</p>
        <input type="file" id="file-input" accept="audio/mp3">
        </div>
        <!-- the pause and play song button -->
        <div id="controls">
            <div id="buttons">
                <button id="play-pause">Play</button>
            </div>
        <!-- start of the line that tracks the time-->
         <div id="timeline">
            <span id="time">0:00</span>
            <input type="range" id="progress" min="0" max="100" value="0">
            <span id="totalDuration">0:00</span>
         </div>
        
        </div>




        <canvas id="visualizer"> </canvas>

        <br><br>

        <div id="controlZone">
            <div>
                <label for="bass-slider"> bass boost</label>
                <input type="range" id="bass-slider" min="0" max="25" value="0">
            </div>
            <div>
                <label for="nostalgia-slider"> old filter</label>
                <input type="range" id="nostalgia-slider" min="0" max="1" step= "1" value="0">
            </div>

    </div>






        <script src="script.js"></script>
    </body>
</html>
